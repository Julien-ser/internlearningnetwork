name: Test & Validate (Node.js Monorepo)
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18.x', '20.x']
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install server dependencies
      run: |
        cd server
        npm ci

    - name: Lint server
      run: |
        cd server
        npm run lint || true
      continue-on-error: true

    - name: Build server
      run: |
        cd server
        npm run build || true
      continue-on-error: true

    - name: Test server
      run: |
        cd server
        npm test || true
      continue-on-error: true

    - name: Install client dependencies
      run: |
        cd client
        npm ci

    - name: Lint client
      run: |
        cd client
        npm run lint || true
      continue-on-error: true

    - name: Build client
      run: |
        cd client
        npm run build || true
      continue-on-error: true

    - name: Test client
      run: |
        cd client
        npm test || true
      continue-on-error: true
